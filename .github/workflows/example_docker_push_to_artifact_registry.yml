name: Docker Push to Artifact Registry
on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # actions/checkout MUST come before auth
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Authenticate to GCP as workload SA for docker push to artifact registry'
        uses: 'google-github-actions/auth@v2'
        with:
          export_environment_variables: true
          project_id : hack-team-code-catalyst
          workload_identity_provider: projects/337990015343/locations/global/workloadIdentityPools/github-2026/db-hackathon/code-catalyst
          service_account: infrastructure@hack-team-code-catalyst.iam.gserviceaccount.com  # Use your Infrastructure SA to manage resources

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Create Artifact Registry repository'
        run: |
            if gcloud artifacts repositories describe ${{ env.REPOSITORY }} --location=${{ env.REGION }} &> /dev/null; then
                echo "Artifact Registry repository '${{ env.REPOSITORY }}' already exists"
            else
                gcloud artifacts repositories create ${{ env.REPOSITORY }} --location=${{ env.REGION }} --repository-format=docker
            fi

        # https://cloud.google.com/artifact-registry/docs/docker/pushing-and-pulling#cred-helper
        # Play it safe - explicitly configure your intended registry host
      - name: 'docker config'
        run: 'gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev'

      - name: 'Build Image'
        # Builds the monolithic image from the repo-root Dockerfile: React UI folded into the Spring Boot jar (see Dockerfile).
        run: docker build -t ${{ env.REGION }}-docker.pkg.dev/hack-team-code-catalyst/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.REGION }}-docker.pkg.dev/hack-team-code-catalyst/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest .

      - name: 'Push Image'
        run: docker push --all-tags ${{ env.REGION }}-docker.pkg.dev/hack-team-code-catalyst/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
