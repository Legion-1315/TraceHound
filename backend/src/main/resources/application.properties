spring.application.name=triage-copilot-backend
server.port=8080

# scripted | llm  (llm additionally requires ANTHROPIC_API_KEY)
triage.investigator-mode=${TRIAGE_MODE:scripted}
triage.anthropic.api-key=${ANTHROPIC_API_KEY:}
triage.anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-5}
triage.memory-file=${TRIAGE_MEMORY_FILE:./data/incident-memory.json}
# pacing for the scripted investigator (ms between steps)
triage.step-delay-min-ms=800
triage.step-delay-max-ms=1500
triage.history-file=${TRIAGE_HISTORY_FILE:./data/incident-history.json}