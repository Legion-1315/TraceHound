# One container, one port — the UI is bundled into the Spring Boot jar.
services:
  triage:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TRIAGE_MODE=${TRIAGE_MODE:-scripted}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - triage-data:/app/data

volumes:
  triage-data:
